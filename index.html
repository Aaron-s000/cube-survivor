<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Open World FIX</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#111;
    font-family:Arial;
    color:white;
}

canvas{
    display:block;
    margin:auto;
    background:#1f7a1f;
}

#ui{
    position:fixed;
    top:10px;
    left:10px;
    z-index:10;
}

#hpBar{
    width:200px;
    height:18px;
    background:#333;
    border:2px solid white;
}

#hpFill{
    height:100%;
    width:100%;
    background:red;
}

#minimap{
    position:fixed;
    bottom:20px;
    right:20px;
    border-radius:50%;
    border:2px solid white;
}
</style>
</head>

<body>

<div id="ui">
❤️ HP
<div id="hpBar"><div id="hpFill"></div></div>
</div>

<canvas id="game" width="900" height="600"></canvas>
<canvas id="minimap" width="150" height="150"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const mini = document.getElementById("minimap");
const mctx = mini.getContext("2d");

let keys = {};

let worldSize = 2000;

let player = {
    x:1000,
    y:1000,
    hp:100,
    speed:4
};

let cam = {x:0,y:0};

let enemies = [];
let items = [];
let bullets = [];

// INPUT
document.addEventListener("keydown", e=>{
    keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e=>{
    keys[e.key.toLowerCase()] = false;
});

document.addEventListener("mousedown", ()=>{
    shoot();
});

// WORLD
for(let i=0;i<50;i++){
    enemies.push({
        x:Math.random()*worldSize,
        y:Math.random()*worldSize,
        speed:1.2
    });
}

for(let i=0;i<30;i++){
    items.push({
        x:Math.random()*worldSize,
        y:Math.random()*worldSize
    });
}

// SHOOT
function shoot(){
    bullets.push({
        x:player.x,
        y:player.y,
        dx:0,
        dy:-8
    });
}

// UPDATE
function update(){

    if(keys["w"]) player.y -= player.speed;
    if(keys["s"]) player.y += player.speed;
    if(keys["a"]) player.x -= player.speed;
    if(keys["d"]) player.x += player.speed;

    cam.x += (player.x - canvas.width/2 - cam.x) * 0.1;
    cam.y += (player.y - canvas.height/2 - cam.y) * 0.1;

    enemies.forEach(e=>{
        let dx = player.x - e.x;
        let dy = player.y - e.y;
        let d = Math.sqrt(dx*dx + dy*dy);

        e.x += dx/d * e.speed;
        e.y += dy/d * e.speed;

        if(d < 18){
            player.hp -= 0.3;
        }
    });

    bullets.forEach(b=>{
        b.y -= 10;
    });

    bullets.forEach((b,i)=>{
        enemies.forEach((e,j)=>{
            let dx = b.x - e.x;
            let dy = b.y - e.y;

            if(Math.sqrt(dx*dx+dy*dy) < 20){
                enemies.splice(j,1);
                bullets.splice(i,1);
            }
        });
    });

    player.hp = Math.max(0, player.hp);

    document.getElementById("hpFill").style.width = player.hp + "%";
}

// DRAW
function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // ITEMS
    ctx.fillStyle="yellow";
    items.forEach(i=>{
        ctx.fillRect(i.x-cam.x, i.y-cam.y, 6,6);
    });

    // ENEMIES
    ctx.fillStyle="red";
    enemies.forEach(e=>{
        ctx.fillRect(e.x-cam.x-10, e.y-cam.y-10, 20,20);
    });

    // BULLETS
    ctx.fillStyle="white";
    bullets.forEach(b=>{
        ctx.fillRect(b.x-cam.x, b.y-cam.y, 4,4);
    });

    // PLAYER
    ctx.fillStyle="cyan";
    ctx.fillRect(player.x-cam.x-10, player.y-cam.y-10, 20,20);

    drawMinimap();
}

// MINIMAP
function drawMinimap(){

    mctx.clearRect(0,0,150,150);

    mctx.fillStyle="#0b3d0b";
    mctx.fillRect(0,0,150,150);

    let s = 150 / worldSize;

    mctx.fillStyle="cyan";
    mctx.fillRect(player.x*s, player.y*s, 3,3);

    mctx.fillStyle="red";
    enemies.forEach(e=>{
        mctx.fillRect(e.x*s, e.y*s, 2,2);
    });
}

// LOOP
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
