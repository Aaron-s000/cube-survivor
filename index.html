<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Open World Survivor</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial;
}

canvas{
    background:#1f7a1f;
    display:block;
    margin:auto;
    border:3px solid white;
}

#hud{
    position:fixed;
    top:10px;
    left:10px;
    font-size:20px;
}
</style>
</head>

<body>

<div id="hud">❤️ Leben: <span id="hp">3</span> | ⭐ Score: <span id="score">0</span></div>

<canvas id="c" width="900" height="600"></canvas>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let keys = {};
let worldSize = 3000;

let player = {
    x:1500,
    y:1500,
    size:20,
    speed:4,
    hp:3
};

let enemies = [];
let trees = [];
let items = [];
let score = 0;

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// 🌲 Welt generieren
for(let i=0;i<200;i++){
    trees.push({
        x:Math.random()*worldSize,
        y:Math.random()*worldSize
    });
}

// 💊 Items
for(let i=0;i<20;i++){
    items.push({
        x:Math.random()*worldSize,
        y:Math.random()*worldSize
    });
}

// 👹 Gegner spawnen
setInterval(()=>{
    enemies.push({
        x:Math.random()*worldSize,
        y:Math.random()*worldSize,
        speed:1.5
    });
},2000);

// Kamera
let cam = {x:0,y:0};

function update(){

    // Bewegung
    if(keys["w"]) player.y -= player.speed;
    if(keys["s"]) player.y += player.speed;
    if(keys["a"]) player.x -= player.speed;
    if(keys["d"]) player.x += player.speed;

    // Kamera folgt Spieler
    cam.x = player.x - canvas.width/2;
    cam.y = player.y - canvas.height/2;

    // Gegner KI
    enemies.forEach(e=>{
        let dx = player.x - e.x;
        let dy = player.y - e.y;
        let d = Math.sqrt(dx*dx+dy*dy);

        e.x += dx/d * e.speed;
        e.y += dy/d * e.speed;

        // Hit
        if(d < 20){
            player.hp--;
            e.x = Math.random()*worldSize;
            e.y = Math.random()*worldSize;
        }
    });

    // Items einsammeln
    items.forEach(i=>{
        let dx = player.x - i.x;
        let dy = player.y - i.y;
        let d = Math.sqrt(dx*dx+dy*dy);

        if(d < 20){
            player.hp = Math.min(3, player.hp+1);
            i.x = Math.random()*worldSize;
            i.y = Math.random()*worldSize;
        }
    });

    score++;
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Bäume
    ctx.fillStyle="darkgreen";
    trees.forEach(t=>{
        ctx.fillRect(t.x-cam.x,t.y-cam.y,20,20);
    });

    // Items
    ctx.fillStyle="yellow";
    items.forEach(i=>{
        ctx.fillRect(i.x-cam.x,i.y-cam.y,10,10);
    });

    // Gegner
    ctx.fillStyle="red";
    enemies.forEach(e=>{
        ctx.fillRect(e.x-cam.x,e.y-cam.y,20,20);
    });

    // Spieler
    ctx.fillStyle="cyan";
    ctx.fillRect(player.x-cam.x,player.y-cam.y,20,20);

    document.getElementById("hp").innerText = player.hp;
    document.getElementById("score").innerText = score;

    if(player.hp <= 0){
        alert("Game Over!");
        location.reload();
    }
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
