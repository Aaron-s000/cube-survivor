<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cube Survivor</title>

<style>
body{
    margin:0;
    background:#1b1b1b;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    margin-top:20px;
}

#hud{
    font-size:24px;
    margin-bottom:10px;
}

canvas{
    background:#222;
    border:3px solid white;
}

#gameOver{
    display:none;
    margin-top:20px;
}

button{
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:8px;
}
</style>
</head>
<body>

<h1>🛡️ Cube Survivor</h1>

<div id="hud">
    Punkte: <span id="score">0</span>
</div>

<canvas id="gameCanvas" width="900" height="550"></canvas>

<div id="gameOver">
    <h2>💀 Game Over</h2>
    <p>Du wurdest von einem Monster erwischt.</p>
    <button onclick="restartGame()">Neustarten</button>
</div>

<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const scoreElement = document.getElementById("score");
const gameOverDiv = document.getElementById("gameOver");

let player;
let enemies;
let keys;
let score;
let running;

function init(){

    player = {
        x:450,
        y:275,
        size:30,
        speed:5
    };

    enemies = [];
    keys = {};
    score = 0;
    running = true;

    startEnemySpawner();

    requestAnimationFrame(gameLoop);
}

document.addEventListener("keydown", e=>{
    keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e=>{
    keys[e.key.toLowerCase()] = false;
});

function startEnemySpawner(){

    setInterval(()=>{

        if(!running) return;

        const side = Math.floor(Math.random()*4);

        let x;
        let y;

        switch(side){

            case 0:
                x = -20;
                y = Math.random()*canvas.height;
                break;

            case 1:
                x = canvas.width+20;
                y = Math.random()*canvas.height;
                break;

            case 2:
                x = Math.random()*canvas.width;
                y = -20;
                break;

            default:
                x = Math.random()*canvas.width;
                y = canvas.height+20;
        }

        enemies.push({
            x,
            y,
            size:20,
            speed:1.5 + score/500
        });

    },1000);
}

function update(){

    if(keys["w"] || keys["arrowup"])
        player.y -= player.speed;

    if(keys["s"] || keys["arrowdown"])
        player.y += player.speed;

    if(keys["a"] || keys["arrowleft"])
        player.x -= player.speed;

    if(keys["d"] || keys["arrowright"])
        player.x += player.speed;

    player.x = Math.max(0, Math.min(canvas.width-30, player.x));
    player.y = Math.max(0, Math.min(canvas.height-50, player.y));

    enemies.forEach(enemy=>{

        const dx = player.x - enemy.x;
        const dy = player.y - enemy.y;

        const distance = Math.sqrt(dx*dx + dy*dy);

        enemy.x += dx / distance * enemy.speed;
        enemy.y += dy / distance * enemy.speed;

        if(
            player.x < enemy.x + 20 &&
            player.x + 30 > enemy.x &&
            player.y < enemy.y + 20 &&
            player.y + 40 > enemy.y
        ){
            gameOver();
        }

    });

    score++;
    scoreElement.textContent = Math.floor(score/10);
}

function drawPlayer(x,y){

    // Schatten
    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.beginPath();
    ctx.ellipse(x+15,y+48,12,5,0,0,Math.PI*2);
    ctx.fill();

    // Kopf
    ctx.fillStyle = "#FFD166";
    ctx.beginPath();
    ctx.arc(x+15,y+10,10,0,Math.PI*2);
    ctx.fill();

    // Augen
    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.arc(x+12,y+8,1.5,0,Math.PI*2);
    ctx.arc(x+18,y+8,1.5,0,Math.PI*2);
    ctx.fill();

    // Körper
    ctx.fillStyle = "#3A86FF";
    ctx.fillRect(x+7,y+20,16,18);

    // Arme
    ctx.strokeStyle = "#FFD166";
    ctx.lineWidth = 3;

    ctx.beginPath();
    ctx.moveTo(x+7,y+24);
    ctx.lineTo(x,y+30);

    ctx.moveTo(x+23,y+24);
    ctx.lineTo(x+30,y+30);
    ctx.stroke();

    // Beine
    ctx.beginPath();
    ctx.moveTo(x+10,y+38);
    ctx.lineTo(x+5,y+48);

    ctx.moveTo(x+20,y+38);
    ctx.lineTo(x+25,y+48);
    ctx.stroke();
}

function drawMonster(x,y){

    // Schatten
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.beginPath();
    ctx.ellipse(x+10,y+20,10,4,0,0,Math.PI*2);
    ctx.fill();

    // Körper
    ctx.fillStyle = "#D90429";
    ctx.beginPath();
    ctx.arc(x+10,y+10,12,0,Math.PI*2);
    ctx.fill();

    // Hörner
    ctx.fillStyle = "#8D0801";

    ctx.beginPath();
    ctx.moveTo(x+3,y);
    ctx.lineTo(x+6,y-8);
    ctx.lineTo(x+9,y);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(x+11,y);
    ctx.lineTo(x+14,y-8);
    ctx.lineTo(x+17,y);
    ctx.fill();

    // Augen
    ctx.fillStyle = "white";

    ctx.beginPath();
    ctx.arc(x+6,y+8,3,0,Math.PI*2);
    ctx.arc(x+14,y+8,3,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "black";

    ctx.beginPath();
    ctx.arc(x+6,y+8,1,0,Math.PI*2);
    ctx.arc(x+14,y+8,1,0,Math.PI*2);
    ctx.fill();

    // Mund
    ctx.strokeStyle = "black";
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.moveTo(x+5,y+16);
    ctx.lineTo(x+10,y+20);
    ctx.lineTo(x+15,y+16);
    ctx.stroke();
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawPlayer(player.x,player.y);

    enemies.forEach(enemy=>{
        drawMonster(enemy.x,enemy.y);
    });
}

function gameLoop(){

    if(!running) return;

    update();
    draw();

    requestAnimationFrame(gameLoop);
}

function gameOver(){
    running = false;
    gameOverDiv.style.display = "block";
}

function restartGame(){
    location.reload();
}

init();

</script>

</body>
</html>
