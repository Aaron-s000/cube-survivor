<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Open World Shooter V2</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#111;
    font-family:Arial;
}

canvas{
    display:block;
    margin:auto;
    background:#2c8f2c;
}

#ui{
    position:fixed;
    top:10px;
    left:10px;
    color:white;
}

#hpBar{
    width:200px;
    height:18px;
    background:#333;
    border:2px solid white;
}

#hpFill{
    height:100%;
    width:100%;
    background:red;
}

#gameOver{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:60px;
    color:red;
    display:none;
    font-weight:bold;
}
</style>
</head>

<body>

<div id="ui">
HP
<div id="hpBar"><div id="hpFill"></div></div>
</div>

<div id="gameOver">GAME OVER</div>

<canvas id="c"></canvas>

<script>

const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = window.innerWidth;
c.height = window.innerHeight;

let keys = {};

let world = {
    width: 3000,
    height: 3000
};

let cam = {x:0,y:0};

let player = {
    x:1500,
    y:1500,
    w:20,
    h:20,
    hp:100,
    speed:4
};

let bullets = [];
let enemyBullets = [];

let enemies = [];
let walls = [];

// --- INPUT ---
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// --- HÄUSER / WÄNDE ---
function createHouse(x,y,w,h){
    walls.push({x,y,w,h});
}

// 3 Häuser
createHouse(800,800,200,200);
createHouse(1700,1200,300,200);
createHouse(1200,2000,250,250);

// --- ENEMIES ---
for(let i=0;i<8;i++){
    enemies.push({
        x:Math.random()*world.width,
        y:Math.random()*world.height,
        w:20,
        h:20,
        cooldown:0
    });
}

// --- COLLISION ---
function collide(a,b){
    return (
        a.x < b.x+b.w &&
        a.x+a.w > b.x &&
        a.y < b.y+b.h &&
        a.y+a.h > b.y
    );
}

// --- MOVEMENT WITH COLLISION ---
function move(obj,dx,dy){

    obj.x += dx;

    for(let w of walls){
        if(collide(obj,w)){
            obj.x -= dx;
        }
    }

    obj.y += dy;

    for(let w of walls){
        if(collide(obj,w)){
            obj.y -= dy;
        }
    }
}

// --- SHOOT ---
function shoot(from,to){
    let dx = to.x-from.x;
    let dy = to.y-from.y;
    let d = Math.sqrt(dx*dx+dy*dy);

    return {
        x:from.x,
        y:from.y,
        dx:dx/d*6,
        dy:dy/d*6,
        w:6,h:6
    };
}

// --- GAME LOOP ---
function update(){

    if(player.hp<=0){
        document.getElementById("gameOver").style.display="block";
        return;
    }

    let dx=0,dy=0;

    if(keys["w"]) dy=-player.speed;
    if(keys["s"]) dy=player.speed;
    if(keys["a"]) dx=-player.speed;
    if(keys["d"]) dx=player.speed;

    move(player,dx,dy);

    // camera follow
    cam.x = player.x - c.width/2;
    cam.y = player.y - c.height/2;

    // enemies
    enemies.forEach(e=>{

        let dx = player.x - e.x;
        let dy = player.y - e.y;
        let d = Math.sqrt(dx*dx+dy*dy);

        e.x += dx/d*1.2;
        e.y += dy/d*1.2;

        e.cooldown--;

        if(e.cooldown<=0){
            enemyBullets.push(shoot(e,player));
            e.cooldown=120;
        }
    });

    // bullets player
    bullets.forEach(b=>{
        b.x += b.dx;
        b.y += b.dy;
    });

    // enemy bullets
    enemyBullets.forEach(b=>{
        b.x += b.dx;
        b.y += b.dy;

        if(
            b.x<player.x+player.w &&
            b.x+6>player.x &&
            b.y<player.y+player.h &&
            b.y+6>player.y
        ){
            player.hp -= 10;
            b.dead=true;
        }
    });

    bullets.forEach(b=>{
        enemies.forEach(e=>{
            if(
                b.x<e.x+e.w &&
                b.x+6>e.x &&
                b.y<e.y+e.h &&
                b.y+6>e.y
            ){
                e.dead=true;
                b.dead=true;
            }
        });
    });

    enemies = enemies.filter(e=>!e.dead);
    bullets = bullets.filter(b=>!b.dead);
    enemyBullets = enemyBullets.filter(b=>!b.dead);

    document.getElementById("hpFill").style.width = player.hp+"%";
}

// --- DRAW ---
function draw(){

    ctx.clearRect(0,0,c.width,c.height);

    // walls (häuser)
    ctx.fillStyle="#555";
    walls.forEach(w=>{
        ctx.fillRect(w.x-cam.x,w.y-cam.y,w.w,w.h);
    });

    // enemies
    ctx.fillStyle="red";
    enemies.forEach(e=>{
        ctx.fillRect(e.x-cam.x,e.y-cam.y,e.w,e.h);
    });

    // enemy bullets
    ctx.fillStyle="orange";
    enemyBullets.forEach(b=>{
        ctx.fillRect(b.x-cam.x,b.y-cam.y,6,6);
    });

    // player bullets
    ctx.fillStyle="yellow";
    bullets.forEach(b=>{
        ctx.fillRect(b.x-cam.x,b.y-cam.y,6,6);
    });

    // player
    ctx.fillStyle="cyan";
    ctx.fillRect(player.x-cam.x,player.y-cam.y,player.w,player.h);
}

// shoot on click
document.addEventListener("mousedown",()=>{
    bullets.push(shoot(player,player));
});

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();

</script>
</body>
</html>
