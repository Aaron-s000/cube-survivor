<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Open World Shooter FIXED</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#111;
    font-family:Arial;
}

canvas{
    display:block;
    background:#2c8f2c;
}

#ui{
    position:fixed;
    top:10px;
    left:10px;
    color:white;
    z-index:10;
}

#hpBar{
    width:220px;
    height:18px;
    background:#333;
    border:2px solid white;
}

#hpFill{
    height:100%;
    width:100%;
    background:red;
}

#gameOver{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:60px;
    color:red;
    display:none;
    font-weight:bold;
}
</style>
</head>

<body>

<div id="ui">
HP
<div id="hpBar"><div id="hpFill"></div></div>
</div>

<div id="gameOver">GAME OVER</div>

<canvas id="c"></canvas>

<script>

const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = window.innerWidth;
c.height = window.innerHeight;

let keys = {};

let world = {
    w: 3000,
    h: 3000
};

let cam = {x:0,y:0};

let gameOver = false;

// PLAYER
let player = {
    x:1500,
    y:1500,
    w:20,
    h:20,
    hp:100,
    speed:4
};

// OBJECTS
let enemies = [];
let bullets = [];
let enemyBullets = [];
let walls = [];

// INPUT
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

document.addEventListener("mousedown", shoot);

// ---------------- WALLS (HÄUSER) ----------------
function addWall(x,y,w,h){
    walls.push({x,y,w,h});
}

addWall(800,800,250,250);
addWall(1600,1200,300,200);
addWall(1200,2000,250,300);

// ---------------- ENEMIES ----------------
for(let i=0;i<10;i++){
    enemies.push({
        x:Math.random()*world.w,
        y:Math.random()*world.h,
        w:20,
        h:20,
        cooldown:0
    });
}

// ---------------- COLLISION ----------------
function collide(a,b){
    return (
        a.x < b.x+b.w &&
        a.x+a.w > b.x &&
        a.y < b.y+b.h &&
        a.y+a.h > b.y
    );
}

// ---------------- MOVE WITH COLLISION ----------------
function move(obj,dx,dy){

    obj.x += dx;
    for(let w of walls){
        if(collide(obj,w)) obj.x -= dx;
    }

    obj.y += dy;
    for(let w of walls){
        if(collide(obj,w)) obj.y -= dy;
    }
}

// ---------------- SHOOT ----------------
function shoot(){

    let angle = 0; // fixed forward shoot (can upgrade later to mouse aim)

    bullets.push({
        x:player.x,
        y:player.y,
        dx:Math.cos(angle)*8,
        dy:Math.sin(angle)*8,
        w:5,
        h:5
    });
}

// enemy shoot toward player
function enemyShoot(e){

    let dx = player.x - e.x;
    let dy = player.y - e.y;
    let d = Math.sqrt(dx*dx+dy*dy);

    return {
        x:e.x,
        y:e.y,
        dx:dx/d*5,
        dy:dy/d*5,
        w:5,
        h:5
    };
}

// ---------------- UPDATE ----------------
function update(){

    if(gameOver) return;

    // PLAYER MOVE
    let dx=0,dy=0;

    if(keys["w"]) dy=-player.speed;
    if(keys["s"]) dy=player.speed;
    if(keys["a"]) dx=-player.speed;
    if(keys["d"]) dx=player.speed;

    move(player,dx,dy);

    // CAMERA FOLLOW
    cam.x += (player.x - c.width/2 - cam.x)*0.08;
    cam.y += (player.y - c.height/2 - cam.y)*0.08;

    // ENEMIES AI
    enemies.forEach(e=>{

        let dx = player.x - e.x;
        let dy = player.y - e.y;
        let d = Math.sqrt(dx*dx+dy*dy);

        e.x += dx/d * 1.2;
        e.y += dy/d * 1.2;

        // SHOOT
        e.cooldown--;

        if(e.cooldown<=0){
            enemyBullets.push(enemyShoot(e));
            e.cooldown = 120;
        }
    });

    // BULLETS PLAYER
    bullets.forEach(b=>{
        b.x += b.dx;
        b.y += b.dy;
    });

    // ENEMY BULLETS
    enemyBullets.forEach(b=>{
        b.x += b.dx;
        b.y += b.dy;

        if(
            b.x < player.x + player.w &&
            b.x + b.w > player.x &&
            b.y < player.y + player.h &&
            b.y + b.h > player.y
        ){
            player.hp -= 8;
            b.dead = true;
        }
    });

    // HIT ENEMIES
    bullets.forEach(b=>{
        enemies.forEach(e=>{
            if(
                b.x < e.x + e.w &&
                b.x + b.w > e.x &&
                b.y < e.y + e.h &&
                b.y + b.h > e.y
            ){
                e.dead = true;
                b.dead = true;
            }
        });
    });

    // CLEANUP
    enemies = enemies.filter(e=>!e.dead);
    bullets = bullets.filter(b=>!b.dead);
    enemyBullets = enemyBullets.filter(b=>!b.dead);

    // HP
    player.hp = Math.max(0, player.hp);

    document.getElementById("hpFill").style.width = player.hp + "%";

    // GAME OVER
    if(player.hp <= 0){
        gameOver = true;
        document.getElementById("gameOver").style.display="block";
    }
}

// ---------------- DRAW ----------------
function draw(){

    ctx.clearRect(0,0,c.width,c.height);

    // WALLS
    ctx.fillStyle="#666";
    walls.forEach(w=>{
        ctx.fillRect(w.x-cam.x,w.y-cam.y,w.w,w.h);
    });

    // ENEMIES
    ctx.fillStyle="red";
    enemies.forEach(e=>{
        ctx.fillRect(e.x-cam.x,e.y-cam.y,e.w,e.h);
    });

    // BULLETS
    ctx.fillStyle="yellow";
    bullets.forEach(b=>{
        ctx.fillRect(b.x-cam.x,b.y-cam.y,b.w,b.h);
    });

    // ENEMY BULLETS
    ctx.fillStyle="orange";
    enemyBullets.forEach(b=>{
        ctx.fillRect(b.x-cam.x,b.y-cam.y,b.w,b.h);
    });

    // PLAYER
    ctx.fillStyle="cyan";
    ctx.fillRect(player.x-cam.x,player.y-cam.y,player.w,player.h);
}

// ---------------- LOOP ----------------
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
