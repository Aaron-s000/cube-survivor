<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Open World Shooter</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    color:white;
    font-family:Arial;
    overflow:hidden;
}

canvas{
    display:block;
    margin:auto;
    background:#1f7a1f;
}

#ui{
    position:fixed;
    top:10px;
    left:10px;
}

#hpBar{
    width:200px;
    height:20px;
    background:#333;
    border:2px solid white;
}

#hpFill{
    height:100%;
    width:100%;
    background:red;
}

#minimap{
    position:fixed;
    bottom:20px;
    right:20px;
    border-radius:50%;
    border:2px solid white;
}

#menu{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
button{
    padding:15px;
    margin:10px;
}
</style>
</head>

<body>

<div id="menu">
    <h1>OPEN WORLD SHOOTER</h1>
    <button onclick="startGame(false)">Singleplayer</button>
    <button onclick="startGame(true)">Multiplayer (Preview)</button>
</div>

<div id="ui">
    ❤️ HP
    <div id="hpBar"><div id="hpFill"></div></div>
    🔫 Weapon: <span id="weapon">Pistol</span>
</div>

<canvas id="game" width="900" height="600"></canvas>
<canvas id="minimap" width="150" height="150"></canvas>

<script>

const c = document.getElementById("game");
const ctx = c.getContext("2d");

const m = document.getElementById("minimap");
const mctx = m.getContext("2d");

let keys = {};
let mouseDown = false;

let worldSize = 2500;

let player;
let bullets = [];
let enemies = [];
let items = [];

let weapons = ["Pistol","Rifle"];
let weaponIndex = 0;

let multiplayer = false;

document.addEventListener("keydown", e=>keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e=>keys[e.key.toLowerCase()] = false);

document.addEventListener("mousedown", ()=>mouseDown = true);
document.addEventListener("mouseup", ()=>mouseDown = false);

document.addEventListener("wheel", e=>{
    weaponIndex += Math.sign(e.deltaY);
    if(weaponIndex < 0) weaponIndex = 0;
    if(weaponIndex >= weapons.length) weaponIndex = weapons.length-1;
});

function startGame(mp){
    multiplayer = mp;
    document.getElementById("menu").style.display="none";

    player = {
        x:1200,
        y:1200,
        hp:100,
        speed:4
    };

    for(let i=0;i<30;i++){
        enemies.push({x:Math.random()*worldSize,y:Math.random()*worldSize,hp:3});
    }

    for(let i=0;i<10;i++){
        items.push({x:Math.random()*worldSize,y:Math.random()*worldSize,type:"gun"});
    }

    loop();
}

function shoot(){
    bullets.push({
        x:player.x,
        y:player.y,
        dx:0,
        dy:-10
    });
}

function update(){

    if(keys["w"]) player.y -= player.speed;
    if(keys["s"]) player.y += player.speed;
    if(keys["a"]) player.x -= player.speed;
    if(keys["d"]) player.x += player.speed;

    if(mouseDown && weapons[weaponIndex] !== "Pistol"){
        shoot();
        mouseDown = false;
    }

    enemies.forEach(e=>{
        let dx = player.x - e.x;
        let dy = player.y - e.y;
        let d = Math.sqrt(dx*dx+dy*dy);

        e.x += dx/d * 1.2;
        e.y += dy/d * 1.2;
    });

    bullets.forEach(b=>{
        b.y -= 8;
    });

    bullets.forEach((b,i)=>{
        enemies.forEach((e,j)=>{
            let dx = b.x - e.x;
            let dy = b.y - e.y;
            if(Math.sqrt(dx*dx+dy*dy) < 20){
                enemies.splice(j,1);
                bullets.splice(i,1);
            }
        });
    });

    document.getElementById("hpFill").style.width = player.hp + "%";
    document.getElementById("weapon").innerText = weapons[weaponIndex];
}

function draw(){

    ctx.clearRect(0,0,c.width,c.height);

    // player
    ctx.fillStyle="cyan";
    ctx.fillRect(player.x-10,player.y-10,20,20);

    // enemies
    ctx.fillStyle="red";
    enemies.forEach(e=>{
        ctx.fillRect(e.x-10,e.y-10,20,20);
    });

    // bullets
    ctx.fillStyle="yellow";
    bullets.forEach(b=>{
        ctx.fillRect(b.x,b.y,5,5);
    });

    drawMinimap();
}

function drawMinimap(){
    mctx.clearRect(0,0,150,150);

    mctx.fillStyle="green";
    mctx.fillRect(0,0,150,150);

    mctx.fillStyle="blue";
    mctx.fillRect(player.x/20,player.y/20,5,5);

    mctx.fillStyle="red";
    enemies.forEach(e=>{
        mctx.fillRect(e.x/20,e.y/20,3,3);
    });
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

</script>

</body>
</html>
